info:
  contact: {}
paths:
  /api/v1/verify/argo/events:
    post:
      consumes:
      - application/json
      description: 由 Argo 或外部发布观察器回写 Release 级状态
      parameters:
      - description: Release Status Data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/pkg_api.VerifyReleaseStatusRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: 回写发布状态
      tags:
      - Verify
  /api/v1/verify/healthz:
    get:
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/httpx.DataResponse-map_string_string'
      summary: Verify Service 健康检查
      tags:
      - Verify
  /api/v1/verify/release/steps:
    post:
      consumes:
      - application/json
      description: 由 Argo Application / Deployment / Rollout 观察器回写 Release steps
      parameters:
      - description: Release Step Data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/pkg_api.VerifyReleaseStepRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: 回写发布步骤
      tags:
      - Verify
  /api/v1/verify/tekton/events:
    post:
      consumes:
      - application/json
      description: 由 Tekton 或外部构建观察器回写 Image 级状态
      parameters:
      - description: Build Status Data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/pkg_api.VerifyBuildStatusRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: 回写构建状态
      tags:
      - Verify
  /api/v1/verify/tekton/steps:
    post:
      consumes:
      - application/json
      description: 由 Tekton TaskRun 观察器回写 Image steps
      parameters:
      - description: Build Step Data
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/pkg_api.VerifyBuildStepRequest'
      produces:
      - application/json
      responses:
        "204":
          description: No Content
      summary: 回写构建步骤
      tags:
      - Verify
